name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun test

      - name: Build standalone binary
        run: |
          bun build bin/plaud-sync.ts --compile --outfile plaud-sync
          tar -czf plaud-sync-darwin-arm64.tar.gz plaud-sync

      - uses: actions/upload-artifact@v4
        with:
          name: plaud-sync-darwin-arm64
          path: plaud-sync-darwin-arm64.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz

  update-tap:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          URL="https://github.com/cchiles/plaud-sync/releases/download/${TAG}/plaud-sync-darwin-arm64.tar.gz"

          curl -sL "$URL" -o plaud-sync.tar.gz
          SHA=$(sha256sum plaud-sync.tar.gz | awk '{print $1}')

          cat > plaud-sync.rb <<FORMULA
          class PlaudSync < Formula
            desc "Sync and transcribe Plaud recordings with speaker diarization"
            homepage "https://github.com/cchiles/plaud-sync"
            version "${VERSION}"
            license "MIT"

            depends_on arch: :arm64
            depends_on "uv"

            url "${URL}"
            sha256 "${SHA}"

            def install
              bin.install "plaud-sync"
            end

            service do
              run [opt_bin/"plaud-sync", "sync"]
              run_type :interval
              interval 1800
              log_path var/"log/plaud-sync/stdout.log"
              error_log_path var/"log/plaud-sync/stderr.log"
              working_dir Dir.home
            end

            test do
              assert_match "plaud-sync", shell_output("#{bin}/plaud-sync 2>&1", 0)
            end
          end
          FORMULA

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/cchiles/homebrew-tap.git" tap
          mkdir -p tap/Formula
          sed 's/^          //' plaud-sync.rb > tap/Formula/plaud-sync.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/plaud-sync.rb
          git commit -m "plaud-sync ${VERSION}"
          git push
